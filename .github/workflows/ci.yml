name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Lays out ~/.cyrius/versions/<VERSION>/{bin,lib} and symlinks
        # ~/.cyrius/{bin,lib} -> versions/<VERSION>/{bin,lib}. cycc (was
        # cc5, renamed in Cyrius 6.0) resolves arch-peer includes (e.g.
        # syscalls_x86_64_linux.cyr) against the version-pinned path;
        # the un-versioned ~/.cyrius/lib layout that worked pre-5.10.9
        # no longer finds peer files.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$VERSIONED/lib/" 2>/dev/null || true
          # cycc_aarch64 (renamed from cc5_aarch64 in Cyrius 6.0) may
          # ship under bin/ (picked up above) or at the tarball
          # top-level depending on the release. Cover both. Mirrors
          # the agnosys / sankoch / yukti workaround.
          [ -f "$CYRIUS_DIR/cycc_aarch64" ] && cp "$CYRIUS_DIR/cycc_aarch64" "$VERSIONED/bin/"
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        # Must run before any step that touches `include "lib/..."`
        # (fmt, lint, vet, build, test). `./lib/` is gitignored —
        # `cyrius deps` populates it from the version-pinned stdlib
        # snapshot + [deps.<name>] git pins. Matches yukti / agnosys /
        # agnostik convention.
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock is generated and committed. Once present, enforce.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Lint
        # Auto-discover so new modules get linted without editing CI.
        # Treat any cyrlint "  warn " line as a failure.
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Format check
        # `cyrius fmt <file>` writes the formatted source to stdout; diff
        # against the committed file catches drift. (`--check` only sets
        # the exit code; it does NOT emit the formatted output, so diffing
        # its stdout always reports spurious drift.)
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/argonaut
          echo "argonaut: $(wc -c < build/argonaut) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/argonaut | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/argonaut | tee /tmp/smoke_output
          grep -q "all systems nominal" /tmp/smoke_output

      - name: Cross-build aarch64 (best-effort)
        # 1.5.4 — restore aarch64 builds. Requires `cycc_aarch64`
        # (renamed from `cc5_aarch64` in Cyrius 6.0) in the toolchain
        # bin dir; skip with a warning if the toolchain release didn't
        # bundle it rather than fail the whole CI run (matches agnosys
        # / agnostik convention). The translation pass converts x86_64
        # syscall numbers to aarch64 at codegen — no argonaut source
        # changes needed.
        #
        # 1.7.1: the cycc_aarch64 6.0.1 hang/stub on src/main.cyr is
        # FIXED in cyrius 6.0.14 — the cross-build emits a real
        # ~1.14 MB aarch64 ELF again. The 6.0.x major-version gate is
        # removed; the cycc_aarch64-presence check below is the only
        # remaining skip (toolchain tarballs without the cross-tool).
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::warning::cycc_aarch64 not shipped with this Cyrius release — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/argonaut-aarch64
          echo "argonaut-aarch64: $(wc -c < build/argonaut-aarch64) bytes"
          file build/argonaut-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/argonaut-aarch64 is not an aarch64 ELF"; exit 1; }
          xxd -l 4 build/argonaut-aarch64 | grep -q "7f45 4c46"

      - name: Smoke test (aarch64 via qemu-user)
        # Best-effort. Real-hardware coverage is gated on a CI
        # runner with native aarch64 capacity (not yet allocated;
        # tracked under the 1.5.4 cross-arch roadmap item). Use
        # qemu-user-static if available — most stock Ubuntu / Debian
        # runners have it preinstalled, but we don't fail the run
        # if it's absent or the cross-build was skipped.
        run: |
          if [ ! -f build/argonaut-aarch64 ]; then
            echo "::warning::aarch64 binary not produced — skipping smoke"
            exit 0
          fi
          if ! command -v qemu-aarch64-static >/dev/null 2>&1 && ! command -v qemu-aarch64 >/dev/null 2>&1; then
            echo "::warning::qemu-aarch64 not installed — skipping aarch64 smoke"
            exit 0
          fi
          QEMU="$(command -v qemu-aarch64-static || command -v qemu-aarch64)"
          "$QEMU" ./build/argonaut-aarch64 | tee /tmp/smoke_aarch64
          grep -q "all systems nominal" /tmp/smoke_aarch64

      - name: Test (28 suites / 743 assertions)
        run: |
          pass=0; fail=0; asserts=0
          for t in tests/tcyr/*.tcyr; do
            out=$(cyrius test "$t" 2>&1)
            sum=$(echo "$out" | grep -E "^[0-9]+ passed,")
            if echo "$sum" | grep -q "0 failed"; then
              pass=$((pass + 1))
              n=$(echo "$sum" | grep -oP "^\d+")
              asserts=$((asserts + n))
            else
              fail=$((fail + 1))
              echo "FAIL: $t"
              echo "$out" | grep -vE '^  dead:|^warning:|^note:' | tail -10
            fi
          done
          echo "suites: $pass pass, $fail fail | assertions: $asserts"
          test $fail -eq 0

      - name: Bench
        # Non-fatal: numbers go to bench-history.csv and the artifact upload.
        run: |
          if [ -f scripts/bench-history.sh ]; then
            sh scripts/bench-history.sh "ci-${GITHUB_SHA::7}" || true
          fi
        continue-on-error: true

      - name: Upload bench history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history
          path: bench-history.csv
          retention-days: 90

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/argonaut
          retention-days: 5

      - name: Upload aarch64 build artifact
        # Conditional — only uploads when the cross-build step
        # actually produced a binary (cycc_aarch64 was available).
        if: hashFiles('build/argonaut-aarch64') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-aarch64
          path: build/argonaut-aarch64
          retention-days: 5

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        # Match code lines only — strip comments via awk, not "grep -v '# '"
        # (which would also eat any line with an inline comment).
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # raw execve / fork outside process_mgmt
          hits=$(grep -rn 'syscall( *59' src/ 2>/dev/null | grep -v process_mgmt || true)
          [ -n "$hits" ] && { echo "FAIL: raw execve outside process_mgmt"; echo "$hits"; FAIL=1; }
          scan "shadow file access"  '"/etc/shadow"'
          scan "raw system()"        '\bsystem\s*('
          # Unbounded stack buffers (>= 64KB → require heap review)
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE CLAUDE.md cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        # The cyrius.cyml manifest pulls package.version from VERSION via
        # ${file:VERSION}; just check VERSION appears in CHANGELOG.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
