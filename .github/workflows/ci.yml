name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "3.9.2"

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Build argonaut
        run: |
          mkdir -p build
          cat src/main.cyr | cc3 > build/argonaut 2>/tmp/cc3_stderr
          if [ $? -ne 0 ]; then
            cat /tmp/cc3_stderr
            exit 1
          fi
          chmod +x build/argonaut
          echo "argonaut: $(wc -c < build/argonaut) bytes"
          # Show warnings but don't fail on them
          grep -v '^$' /tmp/cc3_stderr 2>/dev/null || true

      - name: Smoke test
        run: |
          ./build/argonaut | tee /tmp/smoke_output
          grep -q "all systems nominal" /tmp/smoke_output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/argonaut
          retention-days: 5

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Format check
        run: |
          FAIL=0
          for f in src/*.cyr; do
            [ -f "$f" ] || continue
            cyrfmt "$f" > /tmp/fmt_check
            if ! diff -q "$f" /tmp/fmt_check >/dev/null 2>&1; then
              echo "  NEEDS FORMAT: $f"
              FAIL=1
            fi
          done
          test $FAIL -eq 0 && echo "PASS: all files formatted"

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Check for raw execve outside process_mgmt.cyr
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# " | grep -v process_mgmt; then
            echo "WARN: raw execve outside process_mgmt"
            WARN=1
          fi
          # Check for hardcoded paths that bypass validation
          if grep -rn '"/etc/shadow"' src/ 2>/dev/null; then
            echo "WARN: direct shadow file access"
            WARN=1
          fi
          # Check for unwrapped shell commands
          if grep -rn 'system(' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw system() call (use SafeCommand)"
            WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Tests ──
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Run test suite
        run: |
          pass=0; fail=0; total_assertions=0
          for tcyr in tests/tcyr/*.tcyr; do
            [ -f "$tcyr" ] || continue
            name=$(basename "$tcyr" .tcyr)
            cat "$tcyr" | cc3 2>/dev/null > /tmp/test_$name
            if [ $? -ne 0 ]; then
              err=$(cat "$tcyr" | cc3 2>&1 > /dev/null | head -1)
              echo "  CFAIL: $name ($err)"
              fail=$((fail + 1))
              continue
            fi
            chmod +x /tmp/test_$name
            output=$(/tmp/test_$name 2>&1)
            ec=$?
            a=$(echo "$output" | grep -o '[0-9]* passed' | grep -o '[0-9]*' || echo 0)
            if [ "$ec" -eq 0 ]; then
              echo "  PASS: $name ($a assertions)"
              pass=$((pass + 1))
              total_assertions=$((total_assertions + a))
            else
              echo "  FAIL: $name (exit $ec)"
              fail=$((fail + 1))
            fi
          done
          echo ""
          echo "$pass passed, $fail failed, $total_assertions assertions"
          test $fail -eq 0

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Run benchmarks
        run: |
          if [ -f scripts/bench-history.sh ]; then
            sh scripts/bench-history.sh
          fi
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: bench-history.csv
          retention-days: 90

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ -f "$doc" ]; then
              echo "  OK: $doc"
            else
              echo "  MISSING: $doc"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version' cyrius.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION file:  $VERSION"
          echo "cyrius.toml:   $TOML_VERSION"
          if [ "$VERSION" != "$TOML_VERSION" ]; then
            echo "FAIL: VERSION != cyrius.toml"
            exit 1
          fi
          echo "Version consistent"
