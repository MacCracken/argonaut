name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-features --all-targets -- -D warnings
      - run: cargo check --all-features
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
  deny:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
  test:
    name: Test
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo test --doc
  test-minimal:
    name: Test (minimal features)
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features
      - run: cargo test --no-default-features --features audit
      - run: cargo test --no-default-features --features security
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features
      - run: cargo test --all-features
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: lcov.info
          fail_ci_if_error: false
  semver:
    name: SemVer Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-semver-checks
      - name: Run semver checks (non-blocking)
        run: |
          # Use latest tag as baseline if available, otherwise HEAD~1.
          # Falls back gracefully when baseline deps can't resolve
          # (e.g., upstream dep version bumped between commits).
          BASELINE=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~1")
          echo "Baseline: $BASELINE"
          cargo semver-checks check-release --all-features --baseline-rev "$BASELINE" || {
            echo "::warning::semver-checks failed (may be due to upstream dep version change)"
            true
          }
