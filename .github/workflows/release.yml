name: Release

on:
  push:
    tags:
      - "[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify VERSION matches tag
        run: |
          VERSION=$(cat VERSION 2>/dev/null || grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${GITHUB_REF_NAME}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Build release
        run: cargo build --release --all-features

      - name: Run benchmarks
        run: |
          cargo install cargo-criterion --locked 2>/dev/null || true
          ./scripts/bench-history.sh "release-${GITHUB_REF_NAME}" || true

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
