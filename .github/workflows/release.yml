name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # Version-pinned layout — cycc (was cc5, renamed in Cyrius 6.0)
        # 5.10.9+ resolves arch-peer includes (syscalls_x86_64_linux.cyr
        # etc.) under ~/.cyrius/versions/<V>/lib.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$VERSIONED/lib/" 2>/dev/null || true
          # cycc_aarch64 (renamed from cc5_aarch64 in Cyrius 6.0) may
          # ship under bin/ or at the tarball top-level depending on
          # the release. Cover both.
          [ -f "$CYRIUS_DIR/cycc_aarch64" ] && cp "$CYRIUS_DIR/cycc_aarch64" "$VERSIONED/bin/"
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/argonaut
          echo "argonaut: $(wc -c < build/argonaut) bytes"

      - name: Cross-build aarch64 (best-effort)
        # 1.5.4 — ship aarch64 alongside x86_64 when the toolchain
        # bundles cycc_aarch64 (renamed from cc5_aarch64 in Cyrius
        # 6.0). Skip without failing the run when absent (e.g. older
        # toolchain release tarball); the release publishes whatever
        # binaries were produced.
        #
        # 1.7.1: gated off under Cyrius 6.0.x — cycc_aarch64 6.0.1
        # hangs or stubs out on argonaut's src/main.cyr (see
        # CHANGELOG 1.7.1 Known issues). Releases under 6.0.x ship
        # x86_64 only. Re-enable once an upstream fix lands.
        run: |
          CYRIUS_MAJOR="$(cut -d. -f1 "$HOME/.cyrius/current" 2>/dev/null || echo unknown)"
          if [ "$CYRIUS_MAJOR" = "6" ]; then
            echo "::warning::aarch64 cross-build disabled under Cyrius 6.x — cycc_aarch64 regression (see CHANGELOG 1.7.1 Known issues). Releasing x86_64 only."
            exit 0
          fi
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::warning::cycc_aarch64 not shipped with this Cyrius release — aarch64 binary skipped"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/argonaut-aarch64
          echo "argonaut-aarch64: $(wc -c < build/argonaut-aarch64) bytes"
          file build/argonaut-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/argonaut-aarch64 is not an aarch64 ELF"; exit 1; }

      - name: Test
        run: |
          pass=0; fail=0
          for t in tests/tcyr/*.tcyr; do
            out=$(cyrius test "$t" 2>&1)
            if echo "$out" | grep -E "^[0-9]+ passed," | grep -q "0 failed"; then
              pass=$((pass + 1))
            else
              fail=$((fail + 1)); echo "FAIL: $t"
            fi
          done
          echo "$pass passed, $fail failed"
          test $fail -eq 0

      - name: Smoke test
        run: |
          ./build/argonaut | grep -q "all systems nominal"

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="argonaut-${TAG}/" -o "argonaut-${TAG}-src.tar.gz" HEAD
          cp build/argonaut "argonaut-${TAG}-x86_64-linux"
          # aarch64 binary is best-effort (cycc_aarch64 may not be
          # in the toolchain). Include it when produced; the SHA256SUMS
          # glob lists whatever -linux binaries exist.
          if [ -f build/argonaut-aarch64 ]; then
            cp build/argonaut-aarch64 "argonaut-${TAG}-aarch64-linux"
          fi
          sha256sum argonaut-*.tar.gz argonaut-*-linux > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            argonaut-*.tar.gz
            argonaut-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
          [ -s /tmp/body.md ] || echo "No changelog entry for $TAG." > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "argonaut ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            argonaut-*.tar.gz
            argonaut-*-linux
            cyrius.lock
            SHA256SUMS
